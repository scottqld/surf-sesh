<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Surf — Noosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e242c;
    --text: #c8d0db;
    --muted: #e8a83a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --high: #00e5a0;
    --low: #4a9eff;
    --warn: #ffe94a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,229,160,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  /* HEADER */
  .header {
    padding: 28px 20px 16px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    line-height: 1;
    color: #fff;
  }

  .logo span {
    color: var(--accent);
  }

.logo small {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 300;
  color: var(--accent);
  letter-spacing: 1px;
  display: inline-block;
  vertical-align: bottom;
  margin-left: -6px;
  padding-bottom: 7px;
  text-transform: uppercase;
}

  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }

  /* STATION TOGGLE */
  .station-toggle {
    display: flex;
    margin: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .station-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .station-btn.active {
    background: var(--surface2);
    color: var(--accent);
  }

  /* WARNING BANNER */
  .warning-banner {
    margin: 0 20px 12px;
    padding: 10px 14px;
    background: rgba(255, 179, 71, 0.1);
    border: 1px solid rgba(255, 179, 71, 0.3);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--warn);
    display: none;
  }

  .warning-banner.visible { display: block; }

  /* SECTION LABEL */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 20px 20px 10px;
  }

  /* CURRENT CONDITIONS */
  .current-card {
    margin: 0 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .current-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .current-day {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .current-issued {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .conditions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .condition-item {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .condition-item:nth-child(even) { border-right: none; }
  .condition-item:nth-last-child(-n+2) { border-bottom: none; }

  .condition-item:last-child { border-bottom: none; border-right: none; }

  .condition-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .condition-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
  }

  .condition-value.highlight {
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 400;
  }

  /* WEATHER SYNOPSIS */
  .synopsis-card {
    margin: 12px 20px 0;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 12px;
    color: var(--accent);
    line-height: 1.6;
    font-style: italic;
  }

  /* FORECAST DAYS */
  .forecast-scroll {
    overflow-x: auto;
    padding: 0 20px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .forecast-scroll::-webkit-scrollbar { display: none; }

  .forecast-row {
    display: flex;
    gap: 10px;
    width: max-content;
    padding-bottom: 4px;
  }

  .forecast-card {
    width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }

  .forecast-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .forecast-card-header {
    padding: 10px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .forecast-card-body {
    padding: 10px 12px;
  }

  .fc-row {
    display: flex;
    gap: 6px;
    margin-bottom: 7px;
  }

  .fc-row:last-child { margin-bottom: 0; }

  .fc-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 36px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .fc-val {
    font-size: 11px;
    color: var(--text);
    line-height: 1.4;
  }

  /* SWELL CHART */
  .chart-container {
    margin: 0 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    padding: 16px;
  }

  .chart-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chart-legend {
    display: flex;
    gap: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    color: var(--muted);
  }

  .legend-dot {
    width: 8px;
    height: 2px;
    border-radius: 1px;
  }

  canvas {
    width: 100%;
    height: 120px;
    display: block;
  }

  .chart-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .chart-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
  }

  /* TIDES */
  .tides-container {
    margin: 0 20px;
  }

  .tide-day {
    margin-bottom: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .tide-day-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .tide-entries {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }

  .tide-entry {
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }

  .tide-entry:last-child { border-right: none; }

  .tide-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .tide-type.high { color: var(--high); }
  .tide-type.low { color: var(--low); }

  .tide-time {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
  }

  .tide-height {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 16px;
  }

  .loading-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .loading-bars {
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 24px;
  }

  .loading-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    animation: wave-bar 1.2s ease-in-out infinite;
  }

  .loading-bar:nth-child(1) { animation-delay: 0s; }
  .loading-bar:nth-child(2) { animation-delay: 0.1s; }
  .loading-bar:nth-child(3) { animation-delay: 0.2s; }
  .loading-bar:nth-child(4) { animation-delay: 0.3s; }
  .loading-bar:nth-child(5) { animation-delay: 0.4s; }

  @keyframes wave-bar {
    0%, 100% { height: 4px; opacity: 0.3; }
    50% { height: 24px; opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .error-msg {
    margin: 40px 20px;
    padding: 16px;
    background: rgba(255,100,100,0.1);
    border: 1px solid rgba(255,100,100,0.3);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #ff6464;
    text-align: center;
  }

  /* REFRESH BTN */
  .refresh-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 100;
  }

  .refresh-btn:active {
    transform: scale(0.92);
    box-shadow: 0 2px 10px rgba(0,212,255,0.2);
  }

  .refresh-btn svg {
    width: 20px;
    height: 20px;
    color: #000;
    transition: transform 0.6s;
  }

  .refresh-btn.spinning svg {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .content { display: none; }
  .content.visible { display: block; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">SURF<span>SC</span> <small id="logoSubtitle">Noosa</small></div>
    <div class="last-updated" id="lastUpdated">—</div>
  </header>

<div class="station-toggle">
  <button class="station-btn active" id="btn0" onclick="setBreak(0)">Groyne</button>
  <button class="station-btn" id="btn1" onclick="setBreak(1)">First Pt</button>
  <button class="station-btn" id="btn2" onclick="setBreak(2)">Nationals</button>
  <button class="station-btn" id="btn3" onclick="setBreak(3)">Tea Tree</button>
  <button class="station-btn" id="btn4" onclick="setBreak(4)">Granite</button>
  <button class="station-btn" id="btn5" onclick="setBreak(5)">Sunshine</button>
</div>

  <div id="loadingEl" class="loading">
    <div class="loading-bars">
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
    <div class="loading-label">FETCHING CONDITIONS</div>
  </div>

  <div id="errorEl" style="display:none"></div>

  <div id="content" class="content">
    <div id="breakPhotoWrap" style="margin: 12px 20px 0; height: 140px; border-radius: 10px; overflow: hidden; position: relative;">
      <img id="breakImg" src="" alt="" loading="lazy" style="width:100%; height:100%; object-fit:cover; display:block; transition: opacity 0.3s;">
      <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(10,12,15,0.65) 0%, transparent 55%);"></div>
    </div>
    <div class="synopsis-card" id="breakNotes"></div>

    <div id="warningBanner" class="warning-banner"></div>

    <div class="section-label">CURRENT CONDITIONS</div>
    <div class="current-card" id="currentCard"></div>
    <div class="synopsis-card" id="synopsisCard"></div>

    <div class="section-label">EXTENDED FORECAST</div>
    <div class="forecast-scroll">
      <div class="forecast-row" id="forecastRow"></div>
    </div>

    <div class="section-label">SWELL TREND — 7 DAYS</div>
    <div class="chart-container">
      <div class="chart-title">
        <span>WAVE HEIGHT (M)</span>
        <div class="chart-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--accent)"></div>
            <span>Total</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background: var(--high)"></div>
            <span>Swell</span>
          </div>
        </div>
      </div>
      <canvas id="swellChart"></canvas>
      <div class="chart-labels" id="chartLabels"></div>
    </div>

    <div class="section-label" id="tideLabel">TIDES — NOOSA HEAD</div>
    <div class="tides-container" id="tidesContainer"></div>

  </div>
</div>

<button class="refresh-btn" id="refreshBtn" onclick="loadData(true)" title="Refresh">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="23 4 23 10 17 10"></polyline>
    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
  </svg>
</button>

function getBreakImg(index) {

    const mime = header.match(/:(.*?);/)[1];
    const binary = atob(data);
    const bytes = new Uint8Array(binary.length);
    for (let j = 0; j < binary.length; j++) bytes[j] = binary.charCodeAt(j);

function conditionNoteTomorrow(breakData, forecast) {
  if (!forecast || !forecast.forecasts || forecast.forecasts.length < 2) return '';
  const tomorrow = forecast.forecasts[1];
  const { ideal, acceptable, avoid } = breakData;
  const swellDir    = extractDir(shortDir(tomorrow.swell || ''));
  const windDir     = extractDir(shortDir(tomorrow.winds || ''));
  const swellHeight = extractHeight(shortDir(tomorrow.swell || ''));
  const notes = [];

  // Swell direction
  if (swellDir) {
    if (ideal.swellDirs.includes(swellDir))      notes.push(`${swellDir} swell is on the money`);
    else if (acceptable.swellDirs.includes(swellDir)) notes.push(`${swellDir} swell is workable`);
    else if (avoid.swellDirs.includes(swellDir)) notes.push(`${swellDir} swell is wrong — best from ${ideal.swellDirs.join(' or ')}`);
    else                                          notes.push(`${swellDir} swell is close — best from ${ideal.swellDirs.join(' or ')}`);
  }

  // Swell height
  if (swellHeight !== null) {
    if (swellHeight >= ideal.swellMin && swellHeight <= ideal.swellMax)           notes.push(`size is good at ${swellHeight.toFixed(1)}m`);
    else if (swellHeight >= acceptable.swellMin && swellHeight <= acceptable.swellMax) notes.push(`size is workable at ${swellHeight.toFixed(1)}m`);
    else if (swellHeight < acceptable.swellMin) notes.push(`too small at ${swellHeight.toFixed(1)}m — needs ${ideal.swellMin}m+`);
    else                                        notes.push(`too big at ${swellHeight.toFixed(1)}m — best under ${ideal.swellMax}m`);
  }

  // Wind direction
  if (windDir) {
    if (ideal.windDirs.includes(windDir))           notes.push(`${windDir} wind is offshore`);
    else if (acceptable.windDirs.includes(windDir)) notes.push(`${windDir} wind is manageable`);
    else if (avoid.windDirs.includes(windDir))      notes.push(`${windDir} wind is onshore`);
    else                                            notes.push(`${windDir} wind is cross-shore`);
  }

  return notes.length ? notes.join(', ') + '.' : '';
}

///////////////////////////////////////////////////
  function extractDir(text) {
    const dirs = ['NNE','NNW','SSE','SSW','ENE','ESE','WNW','WSW','NE','NW','SE','SW','N','S','E','W'];
    const shortened = shortDir(text);
    for (const dir of dirs) {
      if (shortened.startsWith(dir + ' ') || shortened.includes(' ' + dir + ' ') || shortened.startsWith(dir + '\n') || shortened === dir) {
        return dir;
      }
    }
    return null;
  }

///////////////////////////////////////////////////
  function extractHeight(text) {
    if (!text || typeof text !== 'string') return null;
    // Match "1 to 1.5m", "1.5m", "1-1.5m", "around 1m" etc.
    const match = text.match(/(\d+\.?\d*)\s*(?:to|-)\s*(\d+\.?\d*)\s*m/i)
                  || text.match(/around\s+(\d+\.?\d*)\s*m/i)
                  || text.match(/(\d+\.?\d*)\s*m/i);
    if (!match) return null;
    // Range form: match[1] and match[2] both present
    if (match[2] !== undefined) {
      return (parseFloat(match[1]) + parseFloat(match[2])) / 2;
    }
    // Single value (including "around X m" where X is match[1])
    return parseFloat(match[1]);
  }

///////////////////////////////////////////////////
// Compass rose in clockwise order
const COMPASS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

function dirDistance(a, b) {
  if (!a || !b) return 99;
  const ia = COMPASS.indexOf(a);
  const ib = COMPASS.indexOf(b);
  if (ia === -1 || ib === -1) return 99;
  const diff = Math.abs(ia - ib);
  return Math.min(diff, COMPASS.length - diff);
}

// Returns 'ideal' | 'acceptable' | 'avoid' | null
function classifyDir(dir, tiers) {
  if (!dir) return null;
  if (tiers.ideal.swellDirs && tiers.ideal.windDirs) {
    // called from swell path — handled inline
  }
  return null;
}

function scoreFactor(dir, idealDirs, acceptableDirs, avoidDirs, fullPoints) {
  if (!dir) return Math.round(fullPoints * 0.5); // unknown — neutral
  if (idealDirs.includes(dir))     return fullPoints;
  if (acceptableDirs.includes(dir)) return Math.round(fullPoints * 0.5);
  if (avoidDirs.length && avoidDirs.includes(dir)) return 0;
  // Not explicitly listed — use compass proximity to ideal as tiebreak
  const minDist = Math.min(...idealDirs.map(d => dirDistance(dir, d)));
  if (minDist <= 1) return Math.round(fullPoints * 0.75);
  return Math.round(fullPoints * 0.25);
}

function scoreHeight(height, idealTier, acceptableTier) {
  if (height === null) return 1; // unknown — neutral
  if (height >= idealTier.swellMin && height <= idealTier.swellMax) return 2;
  if (height >= acceptableTier.swellMin && height <= acceptableTier.swellMax) return 1;
  return 0;
}

function scoreBreak(breakData, forecast) {
  if (!forecast || !forecast.forecasts || forecast.forecasts.length === 0) return 0;
  const current = forecast.forecasts[0];

  const swellText = shortDir(current.swell || '');
  const windText  = shortDir(current.winds  || '');

  const swellDir    = extractDir(swellText);
  const windDir     = extractDir(windText);
  const swellHeight = extractHeight(swellText);

  const { ideal, acceptable, avoid } = breakData;

  // Swell direction — up to 5 pts
  const swellPts = scoreFactor(swellDir, ideal.swellDirs, acceptable.swellDirs, avoid.swellDirs, 5);

  // Wind direction — up to 3 pts
  const windPts = scoreFactor(windDir, ideal.windDirs, acceptable.windDirs, avoid.windDirs, 3);

  // Swell height — up to 2 pts
  const heightPts = scoreHeight(swellHeight, ideal, acceptable);

  return Math.min(Math.round(swellPts + windPts + heightPts), 10);
}

function getCurrentTide(tides) {
  if (!tides || !tides.tides || tides.tides.length === 0) return null;
  const now = new Date();
  const todayStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()}`;
  const todayTides = tides.tides.filter(t => t.date === todayStr);
  if (todayTides.length === 0) return null;

  // Convert tide times to today's Date objects
  const tidesWithDates = todayTides.map(t => {
    const [h, m] = t.time.split(':').map(Number);
    const d = new Date();
    d.setHours(h, m, 0, 0);
    return { ...t, dateObj: d };
  });

  // Find the surrounding tides
  const past = tidesWithDates.filter(t => t.dateObj <= now);
  const future = tidesWithDates.filter(t => t.dateObj > now);
  const prev = past[past.length - 1];
  const next = future[0];

  if (!prev || !next) return null;

  const totalMins = (next.dateObj - prev.dateObj) / 60000;
  const elapsed = (now - prev.dateObj) / 60000;
  const pct = Math.round((elapsed / totalMins) * 100);
  const rising = next.type === 'High';
  const minsToNext = Math.round((next.dateObj - now) / 60000);
  const hToNext = Math.floor(minsToNext / 60);
  const mToNext = minsToNext % 60;
  const timeToNext = hToNext > 0 ? `${hToNext}h ${mToNext}m` : `${mToNext}m`;

  return {
    current: parseFloat(prev.height) + (parseFloat(next.height) - parseFloat(prev.height)) * (elapsed / totalMins),
    rising,
    next,
    timeToNext,
    pct,
  };
}

async function loadData(forceRefresh = false) {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  document.getElementById('loadingEl').style.display = 'flex';
  document.getElementById('content').classList.remove('visible');
  document.getElementById('errorEl').style.display = 'none';

  try {
    const url = forceRefresh
      ? `${WORKER_URL}/all?nocache=1`
      : `${WORKER_URL}/all`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    cachedData = data;

    renderAll(data);

    const now = new Date();
    document.getElementById('lastUpdated').innerHTML =
      `UPDATED<br>${now.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'})}`;

  } catch (e) {
    document.getElementById('loadingEl').style.display = 'none';
    const errEl = document.getElementById('errorEl');
    errEl.innerHTML = `<div class="error-msg">Failed to load data.<br>${e.message}</div>`;
    errEl.style.display = 'block';
  } finally {
    btn.classList.remove('spinning');
  }
  setBreak(0);
}

///////////////////////////////////////////////////
function formatTideTime(time) {
  const [h, m] = time.split(':').map(Number);
  const ampm = h < 12 ? 'am' : 'pm';
  const hour = h % 12 || 12;
  return `${hour}:${m.toString().padStart(2, '0')}${ampm}`;
}

///////////////////////////////////////////////////
function shortDir(text) {
  const dirs = {
    'north-northeasterly': 'NNE', 'north-northwesterly': 'NNW',
    'south-southeasterly': 'SSE', 'south-southwesterly': 'SSW',
    'east-northeasterly': 'ENE', 'east-southeasterly': 'ESE',
    'west-northwesterly': 'WNW', 'west-southwesterly': 'WSW',
    'northeasterly': 'NE', 'northwesterly': 'NW',
    'southeasterly': 'SE', 'southwesterly': 'SW',
    'northerly': 'N', 'southerly': 'S',
    'easterly': 'E', 'westerly': 'W',
    'north-northeast': 'NNE', 'north-northwest': 'NNW',
    'south-southeast': 'SSE', 'south-southwest': 'SSW',
    'northeast': 'NE', 'northwest': 'NW',
    'southeast': 'SE', 'southwest': 'SW',
    'north': 'N', 'south': 'S', 'east': 'E', 'west': 'W',
  };
  text = text.replace(/\bmetres\b/gi, 'm');
  text = text.replace(/\bknots\b/gi, 'kts');

  return text.replace(/\b(north-northeasterly|north-northwesterly|south-southeasterly|south-southwesterly|east-northeasterly|east-southeasterly|west-northwesterly|west-southwesterly|northeasterly|northwesterly|southeasterly|southwesterly|northerly|southerly|easterly|westerly|north-northeast|north-northwest|south-southeast|south-southwest|northeast|northwest|southeast|southwest|north|south|east|west)\b/gi,
    m => dirs[m.toLowerCase()] || m);
}

///////////////////////////////////////////////////
// Extract wind speed from BOM text
function extractWindSpeed(text) {
  const s = shortDir(text);
  const match = s.match(/(\d+)\s*to\s*(\d+)\s*kts/);
  if (match) return `${match[1]}–${match[2]} kts`;
  const single = s.match(/(\d+)\s*kts/);
  if (single) return `${single[1]} kts`;
  return null;
}

        <div class="condition-item">
          <div class="condition-label">Swell</div>
          <div class="condition-value">${extractDir(shortDir(current.swell)) || shortDir(current.swell)}${currentPeriod !== null && currentPeriod !== undefined ? ' · ' + Number(currentPeriod).toFixed(1) + 's' : ''}</div>
        </div>
        <div class="condition-item">
          <div class="condition-label">Weather</div>
          <div class="condition-value">${current.weather}</div>
        </div>

      </div>
      ${tideHtml}
    `;
  }

  // Remaining forecast days
  const forecastRow = document.getElementById('forecastRow');
  forecastRow.innerHTML = '';
  forecast.forecasts.slice(1).forEach(day => {
    const card = document.createElement('div');
    card.className = 'forecast-card';
    card.innerHTML = `
      <div class="forecast-card-header">${day.day.toUpperCase()}</div>
      <div class="forecast-card-body">
        <div class="fc-row">
          <div class="fc-label">Wind</div>
          <div class="fc-val">${shortDir(day.winds)}</div>
        </div>
        <div class="fc-row">
          <div class="fc-label">Seas</div>
          <div class="fc-val">${shortDir(day.seas)}</div>
        </div>
        <div class="fc-row">
          <div class="fc-label">Swell</div>
          <div class="fc-val">${shortDir(day.swell)}</div>
        </div>
        <div class="fc-row">
          <div class="fc-label">Sky</div>
          <div class="fc-val">${day.weather}</div>
        </div>
      </div>
    `;
    forecastRow.appendChild(card);
  });
}

///////////////////////////////////////////////////
function renderTides(tideData) {
  const container = document.getElementById('tidesContainer');
  if (!tideData || !tideData.tides || tideData.tides.length === 0) {
    container.innerHTML = '<div style="padding:20px; color: var(--muted); font-family: DM Mono, monospace; font-size:12px;">No tide data available</div>';
    return;
  }

  // Group by date
  const byDate = {};
  tideData.tides.forEach(t => {
    if (!byDate[t.date]) byDate[t.date] = [];
    byDate[t.date].push(t);
  });

  container.innerHTML = '';
  Object.entries(byDate).slice(0, 3).forEach(([date, entries]) => {
    const parts = date.split('/');
    const d = new Date(parts[2], parts[1]-1, parts[0]);
    const dayName = d.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'}).toUpperCase();

    const dayEl = document.createElement('div');
    dayEl.className = 'tide-day';

    const entriesHtml = entries.map(e => `
      <div class="tide-entry">
        <div class="tide-type ${e.type.toLowerCase()}">${e.type}</div>
        <div class="tide-time">${formatTideTime(e.time)}</div>
        <div class="tide-height">${e.height}m</div>
      </div>
    `).join('');

    dayEl.innerHTML = `
      <div class="tide-day-header">${dayName}</div>
      <div class="tide-entries">${entriesHtml}</div>
    `;
    container.appendChild(dayEl);
  });
}

///////////////////////////////////////////////////
function renderSwellChart(swellData) {
  const canvas = document.getElementById('swellChart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 32;
  const H = 120;

  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const times = swellData.hourly.time;
  const waveH = swellData.hourly.wave_height;
  const swellH = swellData.hourly.swell_wave_height;

  // Sample every 6 hours for cleaner chart
  const step = 6;
  const sampledTimes = [], sampledWave = [], sampledSwell = [];
  for (let i = 0; i < times.length; i += step) {
    sampledTimes.push(times[i]);
    sampledWave.push(waveH[i]);
    sampledSwell.push(swellH[i]);
  }

  const maxVal = Math.max(...sampledWave) * 1.1;
  const minVal = 0;
  const pad = { top: 8, bottom: 8, left: 4, right: 4 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  const xPos = i => pad.left + (i / (sampledTimes.length - 1)) * chartW;
  const yPos = v => pad.top + chartH - ((v - minVal) / (maxVal - minVal)) * chartH;

  // Draw wave_height area fill
  ctx.beginPath();
  ctx.moveTo(xPos(0), yPos(sampledWave[0]));
  sampledWave.forEach((v, i) => { if (i > 0) ctx.lineTo(xPos(i), yPos(v)); });
  ctx.lineTo(xPos(sampledWave.length - 1), H - pad.bottom);
  ctx.lineTo(xPos(0), H - pad.bottom);
  ctx.closePath();
  const fillGrad = ctx.createLinearGradient(0, 0, 0, H);
  fillGrad.addColorStop(0, 'rgba(0,212,255,0.15)');
  fillGrad.addColorStop(1, 'rgba(0,212,255,0.01)');
  ctx.fillStyle = fillGrad;
  ctx.fill();

  // Draw wave_height line
  ctx.beginPath();
  ctx.moveTo(xPos(0), yPos(sampledWave[0]));
  sampledWave.forEach((v, i) => { if (i > 0) ctx.lineTo(xPos(i), yPos(v)); });
  ctx.strokeStyle = 'rgba(0,212,255,0.8)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Draw swell line
  ctx.beginPath();
  ctx.moveTo(xPos(0), yPos(sampledSwell[0]));
  sampledSwell.forEach((v, i) => { if (i > 0) ctx.lineTo(xPos(i), yPos(v)); });
  ctx.strokeStyle = 'rgba(0,229,160,0.7)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75, 1].forEach(t => {
    const y = pad.top + chartH * (1 - t);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  });

  // Day labels
  const labelsEl = document.getElementById('chartLabels');
  const uniqueDays = [...new Set(sampledTimes.map(t =>
    new Date(t).toLocaleDateString('en-AU', {weekday:'short'}).toUpperCase()
  ))];
  labelsEl.innerHTML = uniqueDays.slice(0, 7).map(d =>
    `<span class="chart-label">${d}</span>`
  ).join('');

// Swell size labels — only at local maxima to avoid crowding
  ctx.font = `${10 * dpr}px DM Mono, monospace`;
  ctx.fillStyle = 'rgba(0,212,255,0.8)';
  ctx.textAlign = 'center';

  sampledWave.forEach((v, i) => {
    const prev = sampledWave[i - 1] ?? -Infinity;
    const next = sampledWave[i + 1] ?? -Infinity;
    const isLocalMax = v >= prev && v >= next;
    // Always label the first and last points, plus local peaks
    if (isLocalMax || i === 0 || i === sampledWave.length - 1) {
      const x = xPos(i);
      const y = yPos(v) - 5;
      ctx.fillText(v.toFixed(1) + 'm', x, y);
    }
  });
}

// Auto-refresh every 30 minutes
setInterval(() => loadData(false), 30 * 60 * 1000);

// Initial load
loadData();
</script>
